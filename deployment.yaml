apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-app-deployment
  labels:
    app: retail-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retail-store
  template:
    metadata:
      labels:
        app: retail-store
    spec:
      containers:
      - name: retail-container
        # Replace this with your actual ECR URI after running the push command
        image: 590507089733.dkr.ecr.us-east-1.amazonaws.com/retail-management-system:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: retail-service
spec:
  type: LoadBalancer
  selector:
    app: retail-store
  ports:
  - port: 80          
    targetPort: 8080  